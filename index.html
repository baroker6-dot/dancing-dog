<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dancing Dog Game</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="game-container">
    <div class="score-card glass">
      <h1>💸 부자 랭킹 💸</h1>
      <div class="leaderboard">
        <div class="player">민주: <span id="score-민주">0</span>억</div>
        <div class="player">지우: <span id="score-지우">0</span>억</div>
        <div class="player">나라: <span id="score-나라">0</span>억</div>
        <div class="player">수현: <span id="score-수현">0</span>억</div>
      </div>
    </div>
    
    <!-- Premium SVG Dog Character -->
    <div class="dog-svg-container" id="dog">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%" style="overflow: visible;">
        <defs>
          <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.15" />
          </filter>
        </defs>

        <g class="dog-body-group" style="transform-origin: 100px 180px;">
          <!-- Tail -->
          <g class="tail" style="transform-origin: 60px 140px;" filter="url(#shadow)">
            <path d="M 60 145 C 20 140, 20 90, 60 115 Z" fill="#D27D2D" />
            <path d="M 35 115 C 20 90, 45 105, 60 115 Z" fill="#FDF1D7" />
          </g>

          <!-- Back Left Arm -->
          <g class="limb left-arm" style="transform-origin: 80px 105px;" filter="url(#shadow)">
            <rect x="70" y="100" width="20" height="35" rx="10" fill="#A05A1A" />
            <ellipse cx="80" cy="135" rx="12" ry="9" fill="#FDF1D7" />
            <circle cx="75" cy="136" r="1.5" fill="#3E2723" opacity="0.6"/>
            <circle cx="80" cy="137" r="1.5" fill="#3E2723" opacity="0.6"/>
            <circle cx="85" cy="136" r="1.5" fill="#3E2723" opacity="0.6"/>
          </g>

          <!-- Back Left Leg -->
          <g class="limb left-leg" style="transform-origin: 75px 150px;" filter="url(#shadow)">
            <rect x="65" y="145" width="22" height="30" rx="11" fill="#A05A1A" />
            <ellipse cx="76" cy="175" rx="14" ry="10" fill="#FDF1D7" />
            <circle cx="69" cy="176" r="1.5" fill="#3D2B1F" opacity="0.6"/>
            <circle cx="76" cy="178" r="1.5" fill="#3D2B1F" opacity="0.6"/>
            <circle cx="83" cy="176" r="1.5" fill="#3D2B1F" opacity="0.6"/>
          </g>

          <!-- Torso -->
          <g class="torso-group" style="transform-origin: 100px 125px;" filter="url(#shadow)">
            <path d="M 65 90 C 65 60, 135 60, 135 90 C 135 150, 135 160, 100 160 C 65 160, 65 150, 65 90 Z" fill="#D27D2D" />
            <path d="M 80 100 C 80 80, 120 80, 120 100 C 120 150, 110 158, 100 158 C 90 158, 80 150, 80 100 Z" fill="#FDF1D7" />
          </g>

          <!-- Front Right Leg -->
          <g class="limb right-leg" style="transform-origin: 125px 150px;" filter="url(#shadow)">
            <rect x="114" y="145" width="22" height="30" rx="11" fill="#D27D2D" />
            <ellipse cx="125" cy="175" rx="14" ry="10" fill="#FDF1D7" />
            <circle cx="118" cy="176" r="1.5" fill="#3E2723" opacity="0.6"/>
            <circle cx="125" cy="178" r="1.5" fill="#3E2723" opacity="0.6"/>
            <circle cx="132" cy="176" r="1.5" fill="#3E2723" opacity="0.6"/>
          </g>

          <!-- Front Right Arm -->
          <g class="limb right-arm" style="transform-origin: 120px 105px;" filter="url(#shadow)">
            <rect x="110" y="100" width="20" height="35" rx="10" fill="#D27D2D" />
            <ellipse cx="120" cy="135" rx="12" ry="9" fill="#FDF1D7" />
            <circle cx="115" cy="136" r="1.5" fill="#3E2723" opacity="0.6"/>
            <circle cx="120" cy="137" r="1.5" fill="#3E2723" opacity="0.6"/>
            <circle cx="125" cy="136" r="1.5" fill="#3E2723" opacity="0.6"/>
          </g>

          <!-- Collar -->
          <g class="collar" style="transform-origin: 100px 90px;" filter="url(#shadow)">
            <path d="M 72 86 Q 100 100 128 86" fill="none" stroke="#E53935" stroke-width="8" stroke-linecap="round"/>
            <circle cx="100" cy="95" r="7" fill="#FFD54F" />
            <circle cx="100" cy="95" r="4" fill="#FFA000" />
          </g>

          <!-- Head Group -->
          <g class="head" style="transform-origin: 100px 85px;" filter="url(#shadow)">
            <!-- Left Ear -->
            <g class="ear left-ear" style="transform-origin: 75px 45px;">
              <path d="M 85 55 C 70 15, 30 30, 45 60 C 50 70, 75 65, 85 55 Z" fill="#D27D2D" />
              <path d="M 80 55 C 70 25, 40 35, 50 60 C 55 70, 75 62, 80 55 Z" fill="#FDF1D7" />
            </g>
            <!-- Right Ear -->
            <g class="ear right-ear" style="transform-origin: 125px 45px;">
              <path d="M 115 55 C 130 15, 170 30, 155 60 C 150 70, 125 65, 115 55 Z" fill="#D27D2D" />
              <path d="M 120 55 C 130 25, 160 35, 150 60 C 145 70, 125 62, 120 55 Z" fill="#FDF1D7" />
            </g>

            <!-- Face Base -->
            <ellipse cx="100" cy="65" rx="42" ry="34" fill="#D27D2D" />
            
            <!-- Cheek Fluffs -->
            <path d="M 60 65 Q 50 75 62 80 Z" fill="#D27D2D" />
            <path d="M 140 65 Q 150 75 138 80 Z" fill="#D27D2D" />

            <!-- Blush -->
            <ellipse cx="75" cy="72" rx="6" ry="3.5" fill="#FFAB91" opacity="0.8" />
            <ellipse cx="125" cy="72" rx="6" ry="3.5" fill="#FFAB91" opacity="0.8" />

            <!-- Snout Area -->
            <path d="M 76 75 C 76 60, 124 60, 124 75 C 124 95, 76 95, 76 75 Z" fill="#FDF1D7" />
            
            <!-- Eyes -->
            <circle cx="85" cy="58" r="5.5" fill="#3E2723" />
            <circle cx="115" cy="58" r="5.5" fill="#3E2723" />
            <circle cx="83" cy="56" r="2.5" fill="#FFF" />
            <circle cx="113" cy="56" r="2.5" fill="#FFF" />
            
            <!-- Eyebrows -->
            <path class="eyebrow left-eyebrow" d="M 78 48 Q 85 43 92 48" fill="none" stroke="#A05A1A" stroke-width="2.5" stroke-linecap="round"/>
            <path class="eyebrow right-eyebrow" d="M 108 48 Q 115 43 122 48" fill="none" stroke="#A05A1A" stroke-width="2.5" stroke-linecap="round"/>

            <!-- Nose -->
            <ellipse cx="100" cy="71" rx="8" ry="6" fill="#3E2723" />
            <ellipse cx="98" cy="69" rx="3" ry="1.5" fill="#FFF" opacity="0.8"/> 

            <!-- Mouth -->
            <path d="M 92 78 Q 100 86 108 78" fill="none" stroke="#3E2723" stroke-width="2.5" stroke-linecap="round"/>
            
            <!-- Tongue -->
            <path class="tongue" d="M 96 81 Q 100 98 104 81 Z" fill="#FF5252" />
          </g>
        </g>
      </svg>
    </div>

    <div class="instructions">강아지를 클릭해서 춤추게 하세요! 🐶</div>
  </div>

  <!-- Random Character Reveal Modal -->
  <div class="reveal-modal" id="revealModal">
    <div class="glass modal-content">
      <h2>🎉 벼락부자가 될 주인공은! 🎉</h2>
      <div class="winner-name" id="winnerName">???</div>
      <button id="closeBtn">다시 뽑기</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
